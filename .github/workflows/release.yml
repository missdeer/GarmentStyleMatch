name: Release

on:
  push:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: package-${{ matrix.asset_os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_os: windows
            qt_modules: qtactiveqt
          - os: ubuntu-latest
            asset_os: linux
            qt_modules: ''
          - os: macos-latest
            asset_os: macos
            qt_modules: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.0
          modules: ${{ matrix.qt_modules }}
          cache: true

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev ninja-build zip

      - name: Install libarchive (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libarchive ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G "Ninja Multi-Config"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build \
            -G "Ninja Multi-Config" \
            -DLibArchive_ROOT="$(brew --prefix libarchive)"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -C Release

      - name: Install
        run: cmake --install build --prefix "${{ github.workspace }}/install" --config Release

      - name: Deploy Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Keep every runtime file next to GarmentStyleMatch.exe (or in one of
          # Qt's standard subdirectories below it), so the extracted package is
          # independent of both the runner's Qt installation and vcpkg tree.
          $appDir = Join-Path $env:GITHUB_WORKSPACE 'install/bin'
          $exe = Join-Path $appDir 'GarmentStyleMatch.exe'
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Installed executable not found: $exe"
          }

          $winDeployQt = (Get-Command windeployqt.exe -ErrorAction Stop).Source
          & $winDeployQt `
            --release `
            --force `
            --compiler-runtime `
            --qmldir (Join-Path $env:GITHUB_WORKSPACE 'src/qml') `
            --dir $appDir `
            $exe
          if ($LASTEXITCODE -ne 0) {
            throw "windeployqt failed with exit code $LASTEXITCODE"
          }

          # windeployqt only follows Qt dependencies. libarchive and its
          # transitive dependencies are supplied by vcpkg and must be copied
          # separately from the manifest-mode installed tree.
          $vcpkgBin = Join-Path $env:GITHUB_WORKSPACE 'build/vcpkg_installed/x64-windows/bin'
          $vcpkgDlls = @(Get-ChildItem -LiteralPath $vcpkgBin -Filter '*.dll' -File)
          if ($vcpkgDlls.Count -eq 0) {
            throw "No vcpkg runtime DLLs found in $vcpkgBin"
          }
          $vcpkgDlls | Copy-Item -Destination $appDir -Force

          # Fail the job before creating a release if either the native or QML
          # deployment regresses. These are representative required files;
          # windeployqt remains responsible for resolving the complete Qt set.
          $requiredFiles = @(
            'archive.dll',
            'Qt6Core.dll',
            'Qt6Gui.dll',
            'Qt6Qml.dll',
            'Qt6Quick.dll',
            'Qt6QuickControls2.dll',
            'platforms/qwindows.dll',
            'qml/QtQml/qmldir',
            'qml/QtQuick/qmldir',
            'qml/QtQuick/Controls/qmldir'
          )
          $missingFiles = @($requiredFiles | Where-Object {
            -not (Test-Path -LiteralPath (Join-Path $appDir $_))
          })
          if ($missingFiles.Count -ne 0) {
            throw "Windows deployment is incomplete. Missing: $($missingFiles -join ', ')"
          }

          Write-Host "Windows deployment contents:"
          Get-ChildItem -LiteralPath $appDir -Recurse | ForEach-Object {
            $_.FullName.Substring($appDir.Length + 1)
          }

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "GarmentStyleMatch-${{ github.ref_name }}-${{ matrix.asset_os }}.zip"
          Compress-Archive -Path install/* -DestinationPath $name
          echo "ASSET_NAME=$name" >> $env:GITHUB_ENV

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          name="GarmentStyleMatch-${{ github.ref_name }}-${{ matrix.asset_os }}.zip"
          (cd install && zip -r "../$name" .)
          echo "ASSET_NAME=$name" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*.zip
          fail_on_unmatched_files: true
