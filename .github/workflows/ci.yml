name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_modules: qtactiveqt
          - os: ubuntu-latest
            qt_modules: ''
          - os: macos-latest
            qt_modules: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.0
          modules: ${{ matrix.qt_modules }}
          cache: true

      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev ninja-build

      - name: Install libarchive (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libarchive ninja

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G "Ninja Multi-Config"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build \
            -G "Ninja Multi-Config" \
            -DLibArchive_ROOT="$(brew --prefix libarchive)"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -C Release
