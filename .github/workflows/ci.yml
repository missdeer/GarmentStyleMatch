name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_modules: qtactiveqt
          - os: ubuntu-latest
            qt_modules: ''
          - os: macos-latest
            qt_modules: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.0
          modules: ${{ matrix.qt_modules }}
          cache: true

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev libopencv-dev libsqlite3-dev ninja-build

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libarchive ninja opencv sqlite

      - name: Set up Python for model preparation
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache garment matching models
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: 3rdparty/models
          key: garment-models-v1-${{ runner.os }}

      - name: Prepare garment matching models
        if: runner.os != 'Windows'
        shell: pwsh
        run: ./scripts/download-models.ps1

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G "Ninja Multi-Config"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build \
            -G "Ninja Multi-Config" \
            -DLibArchive_ROOT="$(brew --prefix libarchive)" \
            -DOpenCV_DIR="$(brew --prefix opencv)/lib/cmake/opencv4" \
            -DSQLite3_INCLUDE_DIR="$(brew --prefix sqlite)/include" \
            -DSQLite3_LIBRARY="$(brew --prefix sqlite)/lib/libsqlite3.dylib"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -C Release
